name: Research-stale check

on:
  schedule:
    - cron: "0 7 1 * *"   # 1st of every month, 07:00 UTC
  workflow_dispatch:

jobs:
  stale-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Find slides older than 90 days
        run: |
          set -e
          today=$(date +%s)
          stale=()
          for f in src/content/*.mdx; do
            date=$(grep -m1 '^researchedOn:' "$f" | awk '{print $2}')
            [ -z "$date" ] && continue
            ts=$(date -d "$date" +%s 2>/dev/null || true)
            [ -z "$ts" ] && continue
            age=$(( (today - ts) / 86400 ))
            if [ "$age" -gt 90 ]; then
              stale+=("$f (age ${age}d)")
            fi
          done
          if [ "${#stale[@]}" -gt 0 ]; then
            echo "::warning::${#stale[@]} slide(s) older than 90 days:"
            printf '  - %s\n' "${stale[@]}"
            exit 1
          else
            echo "All slides researched within last 90 days."
          fi
